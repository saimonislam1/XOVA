<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | XOVA</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cursor-glow" id="cursor-glow"></div>
  <div class="hero-bg-glow" style="position:fixed;"></div>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>This Piece Isn't In Stock</h1>
    <p>The page you're looking for has been discontinued or never existed. Let's get you back to the collection.</p>
    <a href="index.html" class="btn btn-primary">Back To XOVA <i class="fa-solid fa-arrow-right"></i></a>
  </div>
  <script>
    const glow = document.getElementById("cursor-glow");
    if (glow && window.matchMedia("(hover: hover)").matches) {
      window.addEventListener("mousemove", (e) => {
        glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
      });
    }
  </script>
</body>
</html>
